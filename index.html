<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F3D3E">
  <title>Contagem de Estoque</title>
  <link rel="manifest"
    href="data:application/json,{%22name%22:%22Contagem%20Estoque%22,%22short_name%22:%22Contagem%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230F3D3E%22,%22theme_color%22:%22%230F3D3E%22}">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --petroleo: #0F3D3E;
      --petroleo2: #155F60;
      --verde-bg: #D4EDDA;
      --verde-tx: #155724;
      --verm-bg: #F8D7DA;
      --verm-tx: #721C24;
      --ambar-bg: #FFF3CD;
      --ambar-tx: #856404;
      --cinza-bg: #F2F6F6;
      --borda: #C4D0D0;
      --txt: #1A2B2B;
      --suave: #5A6A6A;
    }

    html,
    body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--txt);
      background: #EAF0F0;
    }

    #root {
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--petroleo);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .15);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar h1 {
      font-size: 17px;
      font-weight: 700;
    }

    .topbar .badge {
      background: rgba(255, 255, 255, .2);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 13px;
    }

    .topbar .sync {
      background: rgba(255, 255, 255, .14);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .content {
      flex: 1;
      padding: 16px;
      padding-bottom: 90px;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    .card {
      background: #fff;
      border: 1px solid var(--borda);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .06);
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .05s;
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn-primary {
      background: var(--petroleo);
      color: #fff;
    }

    .btn-outline {
      background: #fff;
      color: var(--petroleo);
      border: 2px solid var(--petroleo);
    }

    .btn-ghost {
      background: var(--cinza-bg);
      color: var(--txt);
    }

    .btn-sm {
      padding: 10px 14px;
      font-size: 14px;
      width: auto;
    }

    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
    }

    #reader video {
      border-radius: 12px;
    }

    .scan-hint {
      text-align: center;
      color: var(--suave);
      font-size: 14px;
      margin-top: 10px;
    }

    .prod-nome {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .prod-meta {
      color: var(--suave);
      font-size: 14px;
      margin-bottom: 14px;
    }

    .prod-meta b {
      color: var(--txt);
    }

    .estoque-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--cinza-bg);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .estoque-box .lbl {
      font-size: 13px;
      color: var(--suave);
    }

    .estoque-box .val {
      font-size: 24px;
      font-weight: 800;
      color: var(--petroleo);
    }

    .campos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .campo label {
      display: block;
      font-size: 13px;
      color: var(--suave);
      margin-bottom: 5px;
      font-weight: 600;
    }

    .campo input {
      width: 100%;
      border: 2px solid var(--borda);
      border-radius: 10px;
      padding: 14px;
      font-size: 20px;
      text-align: center;
      font-weight: 700;
      color: var(--txt);
    }

    .campo input:focus {
      outline: none;
      border-color: var(--petroleo);
    }

    .resumo {
      display: flex;
      justify-content: space-around;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 15px;
    }

    .resumo .item {
      text-align: center;
    }

    .resumo .item .n {
      font-size: 22px;
      font-weight: 800;
    }

    .resumo .item .l {
      font-size: 12px;
      color: var(--suave);
    }

    .dif-ok {
      background: var(--verde-bg);
    }

    .dif-ok .valdif {
      color: var(--verde-tx);
    }

    .dif-mais {
      background: var(--verde-bg);
    }

    .dif-mais .valdif {
      color: var(--verde-tx);
    }

    .dif-menos {
      background: var(--verm-bg);
    }

    .dif-menos .valdif {
      color: var(--verm-tx);
    }

    .obs-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .search-box input {
      flex: 1;
      border: 2px solid var(--borda);
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--petroleo);
    }

    .lista-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--borda);
    }

    .lista-item:last-child {
      border-bottom: none;
    }

    .lista-item .nome {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      padding-right: 10px;
    }

    .lista-item .qtd {
      font-size: 13px;
      color: var(--suave);
      white-space: nowrap;
    }

    .lista-item .badge-dif {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 700;
      margin-left: 6px;
    }

    .empty {
      text-align: center;
      color: var(--suave);
      padding: 30px 10px;
      font-size: 15px;
    }

    .tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid var(--borda);
      display: flex;
      z-index: 10;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, .06);
    }

    .tabbar button {
      flex: 1;
      border: none;
      background: none;
      padding: 12px 4px 10px;
      font-size: 11px;
      color: var(--suave);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .tabbar button.active {
      color: var(--petroleo);
      font-weight: 700;
    }

    .tabbar button .ico {
      font-size: 22px;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--petroleo);
      color: #fff;
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      z-index: 50;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .25);
      animation: pop .3s;
      white-space: nowrap;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translate(-50%, 10px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    .naoach {
      text-align: center;
      padding: 20px;
    }

    .naoach .cod {
      font-family: monospace;
      font-size: 18px;
      background: var(--ambar-bg);
      color: var(--ambar-tx);
      padding: 8px 14px;
      border-radius: 8px;
      display: inline-block;
      margin: 10px 0;
    }

    .row-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .link-btn {
      background: none;
      border: none;
      color: var(--petroleo);
      font-size: 13px;
      text-decoration: underline;
      cursor: pointer;
      padding: 4px;
    }

    .cod-chip {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12.5px;
      background: var(--cinza-bg);
      border: 1px solid var(--borda);
      padding: 3px 9px;
      border-radius: 7px;
      color: var(--suave);
      letter-spacing: .4px;
    }

    .sync-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: var(--suave);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    let DADOS = null;
    let BASE_INFO = null; // "Estoque de DD/MM HH:MM" — mostrado no topo
    const { useState, useEffect, useRef, useCallback } = React;
    const h = React.createElement;

    /* ===================================================================
       SINCRONIZAÇÃO COM O GOOGLE SHEETS (via Apps Script Web App)
       -------------------------------------------------------------------
       1) Publique o Codigo.gs como Web App (veja INSTRUCOES.md).
       2) Cole a URL que o Google te der aqui embaixo, entre as aspas.
       3) O SYNC_TOKEN precisa ser IGUAL ao do Codigo.gs.
       Enquanto SYNC_URL estiver vazio, o app funciona normal (só local).
    =================================================================== */
    const SYNC_URL = 'https://script.google.com/macros/s/AKfycbzl-ck-RB7zP_8bcDAbqjCIMXtfiOZgwiSocFl23aBCa1Fmjp9fWzpt9kAzj2VTeNFOAw/exec';                 // <<< COLE AQUI a URL do Web App
    const SYNC_TOKEN = 'lc-2026';        // igual ao SYNC_TOKEN do Codigo.gs

    const FILA_KEY = 'sync_fila';
    function lerFila() { try { return JSON.parse(localStorage.getItem(FILA_KEY) || '{}'); } catch (e) { return {}; } }
    function salvarFila(f) { try { localStorage.setItem(FILA_KEY, JSON.stringify(f)); } catch (e) { } }

    const syncListeners = new Set();
    let syncEstado = { status: SYNC_URL ? 'idle' : 'sem_url', ultimo: null, pendentes: Object.keys(lerFila()).length };
    function setSync(patch) { syncEstado = Object.assign({}, syncEstado, patch); syncListeners.forEach(fn => fn(syncEstado)); }

    function enfileirar(item) {
      const f = lerFila(); f[item.key] = item; salvarFila(f);
      setSync({ pendentes: Object.keys(f).length, status: SYNC_URL ? 'idle' : 'sem_url' });
      agendarFlush(1500);
    }

    let flushTimer = null;
    function agendarFlush(ms) { clearTimeout(flushTimer); flushTimer = setTimeout(flush, ms == null ? 1500 : ms); }

    let enviando = false;
    async function flush() {
      if (!SYNC_URL) { setSync({ status: 'sem_url' }); return; }
      const f = lerFila();
      const chaves = Object.keys(f);
      if (!chaves.length) { setSync({ status: 'ok' }); return; }
      if (enviando) { agendarFlush(2000); return; }
      enviando = true; setSync({ status: 'enviando' });
      const snapshot = {}; chaves.forEach(k => snapshot[k] = JSON.stringify(f[k]));
      const itens = chaves.map(k => f[k]);
      try {
        await fetch(SYNC_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ token: SYNC_TOKEN, itens: itens })
        });
        // resposta opaca (no-cors): consideramos enviado se a rede respondeu.
        const atual = lerFila();
        chaves.forEach(k => { if (JSON.stringify(atual[k]) === snapshot[k]) delete atual[k]; });
        salvarFila(atual);
        const rest = Object.keys(atual).length;
        setSync({ status: rest ? 'idle' : 'ok', ultimo: Date.now(), pendentes: rest });
      } catch (e) {
        setSync({ status: 'offline', pendentes: Object.keys(lerFila()).length });
        agendarFlush(8000);
      } finally {
        enviando = false;
        if (Object.keys(lerFila()).length) agendarFlush(4000);
      }
    }
    window.addEventListener('online', () => agendarFlush(500));

    // índice rápido
    let CODIGOS = {};   // "codigo" -> id
    let PRODUTOS = [];  // [{n,e,p,u}]

    // [v9] códigos vinculados manualmente neste aparelho (código não cadastrado -> produto
    // existente). Fica só local até você revisar a aba "Códigos novos" na planilha e
    // incluir no dados.json — daí a próxima base baixada já traz o código de verdade.
    const CODEXTRA_KEY = 'codigos_extra';
    function lerCodigosExtra() { try { return JSON.parse(localStorage.getItem(CODEXTRA_KEY) || '{}'); } catch (e) { return {}; } }
    function salvarCodigosExtra(o) { try { localStorage.setItem(CODEXTRA_KEY, JSON.stringify(o)); } catch (e) { } }
    let CODIGOS_EXTRA = lerCodigosExtra();

    function fmtPreco(p) { if (p === '' || p == null) return '—'; return 'R$ ' + Number(p).toFixed(2).replace('.', ','); }
    function num(v) { if (v === '' || v == null) return 0; const n = Number(v); return isNaN(n) ? 0 : n; }
    function codigoDoId(id) { return Object.keys(CODIGOS).find(k => CODIGOS[k] == id) || ''; }
    function codigosDoId(id) { const out = []; for (const k in CODIGOS) { if (CODIGOS[k] == id) out.push(k); } return out; }

    // ---- seleção de câmera (celulares com várias lentes: Samsung, iPhone...) ----
    let CAMERAS_CACHE = null;
    async function listarCameras() {
      if (CAMERAS_CACHE) return CAMERAS_CACHE;
      try { CAMERAS_CACHE = (await Html5Qrcode.getCameras()) || []; } catch (e) { CAMERAS_CACHE = []; }
      return CAMERAS_CACHE;
    }
    function pontuarCamera(c) {
      const l = (c.label || '').toLowerCase();
      let s = 0;
      if (/back|rear|tras|environment/.test(l)) s += 10;      // traseira
      if (/front|frontal|user|selfie/.test(l)) s -= 10;       // frontal
      if (/ultra|0\.5|tele|zoom|macro|depth|bokeh/.test(l)) s -= 6; // lentes sem foco de perto
      return s;
    }

    function App() {
      const [tab, setTab] = useState('scan');
      const [produtoAtivo, setProdutoAtivo] = useState(null); // {id, cod}
      const [contagens, setContagens] = useState({}); // id -> {loja, estoque}
      const [toast, setToast] = useState(null);
      const [naoAchado, setNaoAchado] = useState(null);
      const [sync, setSyncState] = useState(syncEstado);

      useEffect(() => {
        try { const s = localStorage.getItem('contagens'); if (s) setContagens(JSON.parse(s)); } catch (e) { }
      }, []);
      useEffect(() => {
        try { localStorage.setItem('contagens', JSON.stringify(contagens)); } catch (e) { }
      }, [contagens]);

      // assina o estado de sincronização e tenta esvaziar a fila ao abrir
      useEffect(() => {
        const fn = s => setSyncState(Object.assign({}, s));
        syncListeners.add(fn);
        agendarFlush(800);
        return () => syncListeners.delete(fn);
      }, []);

      const mostrarToast = useCallback((msg) => {
        setToast(msg); setTimeout(() => setToast(null), 1800);
      }, []);

      const onCodigo = useCallback((cod) => {
        cod = String(cod).trim();
        const id = CODIGOS[cod];
        if (id === undefined) {
          // tentar sem zeros à esquerda / com variações
          const alt = Object.keys(CODIGOS).find(k => k.replace(/^0+/, '') === cod.replace(/^0+/, ''));
          if (alt !== undefined) { setProdutoAtivo({ id: CODIGOS[alt], cod: alt }); setNaoAchado(null); setTab('scan'); mostrarToast('Produto encontrado'); return; }
          // [v9] código já vinculado por você neste aparelho (ainda não está no dados.json)
          if (CODIGOS_EXTRA[cod] !== undefined) { setProdutoAtivo({ id: CODIGOS_EXTRA[cod], cod }); setNaoAchado(null); setTab('scan'); mostrarToast('Produto encontrado (vinculado por você)'); return; }
          setNaoAchado(cod); setProdutoAtivo(null);
          return;
        }
        setProdutoAtivo({ id, cod }); setNaoAchado(null); setTab('scan');
        mostrarToast('Produto encontrado');
      }, [mostrarToast]);

      // [v9] vincula um código não encontrado a um produto já existente, sem parar a
      // contagem: reconhece localmente pros próximos scans e manda pra planilha (aba
      // "Códigos novos") pra revisão e inclusão no dados.json.
      const vincularCodigo = useCallback((codigo, id) => {
        const p = PRODUTOS[id]; if (!p) return;
        const extra = lerCodigosExtra(); extra[codigo] = id; salvarCodigosExtra(extra); CODIGOS_EXTRA = extra;
        enfileirar({
          key: 'cn_' + codigo + '_' + Date.now(),
          tipo: 'codigo_novo',
          codigo: codigo,
          nome: p.n,
          chave: id,
          ts: Date.now()
        });
        setProdutoAtivo({ id, cod: codigo }); setNaoAchado(null); setTab('scan');
        mostrarToast('Código vinculado a "' + p.n + '"');
      }, [mostrarToast]);

      // registra a contagem na fila de sincronização com o Google Sheets
      const registrarSync = useCallback((id, loja, estoque, etiqueta) => {
        const p = PRODUTOS[id]; if (!p) return;
        const total = num(loja) + num(estoque);
        const sist = num(p.e);
        enfileirar({
          key: String(id),
          codigo: codigoDoId(id),
          nome: p.n,
          qtdLoja: num(loja),
          qtdEstoque: num(estoque),
          total: total,
          sistema: sist,
          diferenca: total - sist,
          etiqueta: !!etiqueta, // [v9]
          ts: Date.now()
        });
      }, []);

      const salvarContagem = useCallback((id, loja, estoque, etiqueta) => {
        const semNada = (loja === '' || loja == null) && (estoque === '' || estoque == null) && !etiqueta; // [v9]
        setContagens(prev => {
          const nv = { ...prev };
          if (semNada) { delete nv[id]; }
          else { nv[id] = { loja, estoque, etiqueta: !!etiqueta }; }
          return nv;
        });
        // só sincroniza quando há contagem ou marcação de etiqueta de fato
        if (!semNada) {
          registrarSync(id, loja, estoque, etiqueta);
        }
      }, [registrarSync]);

      const sincronizarTudo = useCallback(() => {
        const ids = Object.keys(contagens);
        ids.forEach(id => { const c = contagens[id]; registrarSync(id, c.loja, c.estoque, c.etiqueta); });
        agendarFlush(200);
        mostrarToast(ids.length ? 'Enviando ' + ids.length + ' pra planilha…' : 'Nada pra sincronizar');
      }, [contagens, registrarSync, mostrarToast]);

      return h('div', null,
        h('div', { className: 'topbar' },
          h('div', null,
            h('h1', null, 'Contagem de Estoque'),
            BASE_INFO && h('div', { style: { fontSize: 11, opacity: .78, marginTop: 1 } }, BASE_INFO)
          ),
          h('div', { style: { display: 'flex', gap: 8, alignItems: 'center' } },
            h(SyncBadge, { sync }),
            h('span', { className: 'badge' }, Object.keys(contagens).length + ' contados')
          )
        ),
        h('div', { className: 'content' },
          tab === 'scan' && h(ScanTab, { onCodigo, produtoAtivo, setProdutoAtivo, contagens, salvarContagem, naoAchado, setNaoAchado, vincularCodigo }),
          tab === 'busca' && h(BuscaTab, { onSelect: (id) => { setProdutoAtivo({ id, cod: null }); setTab('scan'); }, contagens }),
          tab === 'lista' && h(ListaTab, { contagens, onSelect: (id) => { setProdutoAtivo({ id, cod: null }); setTab('scan'); }, mostrarToast, sync, sincronizarTudo })
        ),
        h('div', { className: 'tabbar' },
          h(TabBtn, { id: 'scan', atual: tab, set: setTab, ico: '📷', label: 'Escanear' }),
          h(TabBtn, { id: 'busca', atual: tab, set: setTab, ico: '🔍', label: 'Buscar' }),
          h(TabBtn, { id: 'lista', atual: tab, set: setTab, ico: '📋', label: 'Contagens' })
        ),
        toast && h('div', { className: 'toast' }, toast)
      );
    }

    function SyncBadge({ sync }) {
      let txt = '';
      const p = sync.pendentes || 0;
      switch (sync.status) {
        case 'sem_url': txt = '⚪ local'; break;
        case 'enviando': txt = '🔄 enviando…'; break;
        case 'ok': txt = '☁️ salvo'; break;
        case 'offline': txt = '📴 ' + p + ' pendente' + (p === 1 ? '' : 's'); break;
        default: txt = p ? '☁️ ' + p + ' p/ enviar' : '☁️ salvo';
      }
      return h('span', { className: 'sync', title: 'Sincronização com a planilha' }, txt);
    }

    function TabBtn({ id, atual, set, ico, label }) {
      return h('button', { className: atual === id ? 'active' : '', onClick: () => set(id) },
        h('span', { className: 'ico' }, ico), h('span', null, label));
    }

    function ScanTab({ onCodigo, produtoAtivo, setProdutoAtivo, contagens, salvarContagem, naoAchado, setNaoAchado, vincularCodigo }) {
      const [scanning, setScanning] = useState(false);
      const [torchOn, setTorchOn] = useState(false);
      const [temVarias, setTemVarias] = useState(false);
      const [vinculando, setVinculando] = useState(false); // [v9]
      const scannerRef = useRef(null);
      const camIdRef = useRef(null);
      const divId = 'reader';

      useEffect(() => { setVinculando(false); }, [naoAchado]); // [v9] reseta a busca a cada código novo

      const parar = useCallback(async () => {
        if (scannerRef.current) {
          try { await scannerRef.current.applyVideoConstraints({ advanced: [{ torch: false }] }); } catch (e) { }
          try { await scannerRef.current.stop(); await scannerRef.current.clear(); } catch (e) { }
          scannerRef.current = null;
        }
        setTorchOn(false);
        setScanning(false);
      }, []);

      const iniciar = useCallback(async (cameraIdForcada) => {
        setScanning(true); setNaoAchado(null);
        await new Promise(r => setTimeout(r, 100));
        try {
          const scanner = new Html5Qrcode(divId, { verbose: false });
          scannerRef.current = scanner;

          // escolhe a lente: usa a memorizada; senão, a traseira principal
          // (evita ultrawide/tele/macro, que borram de perto em Samsung etc.)
          let alvo = { facingMode: 'environment' };
          const cams = await listarCameras();
          if (cams.length) {
            setTemVarias(cams.length > 1);
            let id = cameraIdForcada || (function () { try { return localStorage.getItem('cameraId'); } catch (e) { return null; } })();
            if (!id || !cams.some(c => c.id === id)) {
              id = cams.slice().sort((a, b) => pontuarCamera(b) - pontuarCamera(a))[0].id;
            }
            camIdRef.current = id;
            try { localStorage.setItem('cameraId', id); } catch (e) { }
            alvo = id;
          }

          await scanner.start(
            alvo,
            {
              fps: 10, qrbox: { width: 260, height: 160 },
              formatsToSupport: [
                Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
                Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,
                Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39,
                Html5QrcodeSupportedFormats.QR_CODE
              ]
            },
            (txt) => { parar(); onCodigo(txt); },
            () => { }
          );
          setTorchOn(false);
          // foco contínuo + zoom leve: melhora foco de perto (Galaxy); ignorado onde não há suporte
          try { await scanner.applyVideoConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch (e) { }
          try {
            const caps = scanner.getRunningTrackCapabilities();
            if (caps && caps.zoom && caps.zoom.max > 1) {
              await scanner.applyVideoConstraints({ advanced: [{ zoom: Math.min(2, caps.zoom.max) }] });
            }
          } catch (e) { }
        } catch (e) { alert('Erro ao abrir a câmera: ' + e + '\n\nVerifique se deu permissão de câmera ao navegador.'); setScanning(false); }
      }, [onCodigo, parar]);

      // alterna entre as lentes disponíveis (memoriza a que funcionou)
      const trocarCamera = useCallback(async () => {
        const cams = await listarCameras();
        if (cams.length < 2) return;
        const i = Math.max(0, cams.findIndex(c => c.id === camIdRef.current));
        const prox = cams[(i + 1) % cams.length].id;
        await parar();
        iniciar(prox);
      }, [iniciar, parar]);

      const toggleTorch = useCallback(async () => {
        if (!scannerRef.current) return;
        const novo = !torchOn;
        try {
          await scannerRef.current.applyVideoConstraints({ advanced: [{ torch: novo }] });
          setTorchOn(novo);
        } catch (e) {
          alert('Não consegui controlar a lanterna neste aparelho/navegador. Em iPhone, o Safari não permite a lanterna pela câmera da web.');
        }
      }, [torchOn]);

      useEffect(() => () => { parar(); }, [parar]);

      return h('div', null,
        h('div', { className: 'card' },
          !scanning && h('button', { className: 'btn btn-primary', onClick: () => iniciar() }, '📷  Escanear código de barras'),
          scanning && h('div', null,
            h('div', { id: divId }),
            h('p', { className: 'scan-hint' }, temVarias ? 'Imagem borrada? Toque em "Lente"' : 'Aponte para o código de barras'),
            h('div', { style: { display: 'flex', gap: 8, marginTop: 12 } },
              h('button', { className: (torchOn ? 'btn btn-primary' : 'btn btn-outline') + ' btn-sm', style: { flex: 1 }, onClick: toggleTorch },
                torchOn ? '🔦 Ligada' : '🔦 Lanterna'),
              temVarias && h('button', { className: 'btn btn-outline btn-sm', style: { flex: 1 }, onClick: trocarCamera }, '🔄 Lente'),
              h('button', { className: 'btn btn-ghost btn-sm', style: { flex: 1 }, onClick: parar }, 'Cancelar')
            )
          )
        ),
        naoAchado && h('div', { className: 'card' },
          h('div', { className: 'naoach' },
            h('div', { style: { fontSize: 40 } }, '⚠️'),
            h('p', { style: { fontWeight: 700, marginTop: 8 } }, 'Código não encontrado'),
            h('div', { className: 'cod' }, naoAchado),
            h('p', { style: { color: 'var(--suave)', fontSize: 14 } }, 'Esse código não está na base. Pode ser um produto novo ou sem cadastro.'),
            !vinculando && h('button', {
              className: 'btn btn-outline btn-sm', style: { marginTop: 10 },
              onClick: () => setVinculando(true)
            }, '🔗 Vincular a um produto existente')
          ),
          vinculando && h(VincularBusca, {
            codigo: naoAchado,
            onEscolher: (id) => { vincularCodigo(naoAchado, id); setVinculando(false); },
            onCancelar: () => setVinculando(false)
          })
        ),
        produtoAtivo && h(ProdutoCard, { produtoAtivo, contagens, salvarContagem, onFechar: () => setProdutoAtivo(null) }),
        !produtoAtivo && !naoAchado && !scanning && h('div', { className: 'empty' }, 'Escaneie um produto para ver as informações e registrar a contagem.')
      );
    }

    // [v9] busca por nome (dentro do fluxo de código não encontrado) pra vincular o
    // código escaneado a um produto já existente, sem sair da tela de contagem.
    function VincularBusca({ codigo, onEscolher, onCancelar }) {
      const [q, setQ] = useState('');
      const termo = q.trim().toUpperCase();
      let resultados = [];
      if (termo.length >= 2) {
        for (let i = 0; i < PRODUTOS.length && resultados.length < 30; i++) {
          if (PRODUTOS[i].n.toUpperCase().includes(termo)) resultados.push(i);
        }
      }
      return h('div', { style: { marginTop: 14, borderTop: '1px solid var(--borda)', paddingTop: 14 } },
        h('div', { className: 'search-box' },
          h('input', {
            type: 'text', value: q, placeholder: 'Nome do produto...', autoFocus: true,
            onChange: e => setQ(e.target.value)
          })
        ),
        termo.length < 2 && h('p', { className: 'scan-hint' }, 'Digite parte do nome do produto pra vincular'),
        termo.length >= 2 && resultados.length === 0 && h('p', { className: 'empty' }, 'Nenhum produto encontrado'),
        resultados.map(id => h('div', {
          key: id, className: 'lista-item', style: { cursor: 'pointer' },
          onClick: () => {
            if (confirm('Vincular o código ' + codigo + ' ao produto:\n\n"' + PRODUTOS[id].n + '"?\n\nIsso não muda o código principal do produto — só fica registrado pra você revisar na planilha (aba "Códigos novos") e incluir no dados.json.')) {
              onEscolher(id);
            }
          }
        },
          h('span', { className: 'nome' }, PRODUTOS[id].n),
          h('span', { className: 'qtd' }, PRODUTOS[id].e === '' ? '' : 'sist: ' + PRODUTOS[id].e)
        )),
        h('button', { className: 'btn btn-ghost btn-sm', style: { marginTop: 8 }, onClick: onCancelar }, 'Cancelar')
      );
    }

    function ProdutoCard({ produtoAtivo, contagens, salvarContagem, onFechar }) {
      const p = PRODUTOS[produtoAtivo.id];
      const cont = contagens[produtoAtivo.id] || {};
      const [loja, setLoja] = useState(cont.loja ?? '');
      const [estoque, setEstoque] = useState(cont.estoque ?? '');
      const [etiqueta, setEtiqueta] = useState(!!cont.etiqueta); // [v9]
      const [verTodosCods, setVerTodosCods] = useState(false);
      const cods = codigosDoId(produtoAtivo.id);

      useEffect(() => {
        const c = contagens[produtoAtivo.id] || {};
        setLoja(c.loja ?? ''); setEstoque(c.estoque ?? '');
        setEtiqueta(!!c.etiqueta); // [v9]
        setVerTodosCods(false);
      }, [produtoAtivo.id]);

      const temContagem = loja !== '' || estoque !== '';
      const total = temContagem ? num(loja) + num(estoque) : null;
      const estSist = num(p.e);
      const dif = total === null ? null : total - estSist;

      let difClass = 'dif-ok', obsTxt = 'OK', obsBg = 'var(--verde-bg)', obsTx = 'var(--verde-tx)';
      if (dif !== null) {
        if (dif > 0) { difClass = 'dif-mais'; obsTxt = 'Sobra (+' + dif + ')'; }
        else if (dif < 0) { difClass = 'dif-menos'; obsTxt = 'Falta (' + dif + ')'; obsBg = 'var(--verm-bg)'; obsTx = 'var(--verm-tx)'; }
        else { obsTxt = 'Bateu certo'; }
      }

      const salvar = () => { salvarContagem(produtoAtivo.id, loja, estoque, etiqueta); };
      useEffect(() => { const t = setTimeout(salvar, 400); return () => clearTimeout(t); }, [loja, estoque, etiqueta]); // [v9]

      return h('div', { className: 'card' },
        h('div', { className: 'prod-nome' }, p.n),
        h('div', { className: 'prod-meta' },
          'Unidade: ', h('b', null, p.u || '—'), '  ·  Preço: ', h('b', null, fmtPreco(p.p))
        ),
        cods.length > 0 && h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'center', marginBottom: 12 } },
          (verTodosCods ? cods : cods.slice(0, 1)).map(c => h('span', { key: c, className: 'cod-chip' }, c)),
          cods.length > 1 && h('button', {
            className: 'link-btn', style: { fontSize: 12, padding: '2px 4px' },
            onClick: () => setVerTodosCods(v => !v)
          }, verTodosCods ? 'ocultar' : '+' + (cods.length - 1) + ' código' + (cods.length > 2 ? 's' : ''))
        ),
        h('div', { className: 'estoque-box' },
          h('span', { className: 'lbl' }, 'Estoque no sistema:'),
          h('span', { className: 'val' }, p.e === '' ? '—' : p.e)
        ),
        h('div', { className: 'campos' },
          h('div', { className: 'campo' },
            h('label', null, 'Qtd na loja'),
            h('input', {
              type: 'number', inputMode: 'numeric', value: loja, placeholder: '0',
              onChange: e => setLoja(e.target.value)
            })
          ),
          h('div', { className: 'campo' },
            h('label', null, 'Qtd no estoque'),
            h('input', {
              type: 'number', inputMode: 'numeric', value: estoque, placeholder: '0',
              onChange: e => setEstoque(e.target.value)
            })
          )
        ),
        temContagem && h('div', { className: 'resumo ' + difClass },
          h('div', { className: 'item' }, h('div', { className: 'n' }, total), h('div', { className: 'l' }, 'Total contado')),
          h('div', { className: 'item' }, h('div', { className: 'n' }, estSist), h('div', { className: 'l' }, 'Sistema')),
          h('div', { className: 'item' }, h('div', { className: 'n valdif' }, dif > 0 ? '+' + dif : dif), h('div', { className: 'l' }, 'Diferença'))
        ),
        temContagem && h('div', { style: { textAlign: 'center', marginBottom: 12 } },
          h('span', { className: 'obs-tag', style: { background: obsBg, color: obsTx } }, obsTxt)
        ),
        h('button', { // [v9]
          className: 'btn btn-sm ' + (etiqueta ? 'btn-primary' : 'btn-outline'),
          style: { width: '100%', marginBottom: 12 },
          onClick: () => setEtiqueta(v => !v)
        }, etiqueta ? '🏷️ Etiqueta nova marcada ✓' : '🏷️ Marcar: precisa de etiqueta nova'),
        h('div', { className: 'row-actions' },
          h('button', { className: 'btn btn-ghost btn-sm', onClick: () => { setLoja(''); setEstoque(''); } }, 'Limpar'),
          h('button', { className: 'btn btn-outline btn-sm', onClick: onFechar }, 'Fechar')
        )
      );
    }

    function BuscaTab({ onSelect, contagens }) {
      const [q, setQ] = useState('');
      const termo = q.trim().toUpperCase();
      // busca por CÓDIGO: se digitou só números (4+ dígitos), procura no código de barras
      const soDigitos = termo.replace(/[\s.\-]/g, '');
      const ehCodigo = /^\d{4,}$/.test(soDigitos);
      let resultados = [];
      if (ehCodigo) {
        const alvo = soDigitos.replace(/^0+/, ''); // ignora zeros à esquerda
        const exatos = [], parciais = [], vistos = new Set();
        for (const k in CODIGOS) {
          const id = CODIGOS[k];
          if (vistos.has(id)) continue;
          const kz = k.replace(/^0+/, '');
          if (kz === alvo) { vistos.add(id); exatos.push(id); }
          else if (kz.indexOf(alvo) >= 0) { vistos.add(id); parciais.push(id); }
          if (exatos.length + parciais.length >= 50) break;
        }
        resultados = exatos.concat(parciais);
      }
      // busca por NOME (também como fallback quando o número não achou código,
      // pois muitos nomes têm números, ex.: "REF 4089")
      if (!resultados.length && termo.length >= 2) {
        for (let i = 0; i < PRODUTOS.length && resultados.length < 50; i++) {
          if (PRODUTOS[i].n.toUpperCase().includes(termo)) resultados.push(i);
        }
      }
      return h('div', null,
        h('div', { className: 'card' },
          h('div', { className: 'search-box' },
            h('input', {
              type: 'text', value: q, placeholder: 'Nome ou código de barras...', autoFocus: true,
              onChange: e => setQ(e.target.value)
            })
          ),
          termo.length < 2 && h('p', { className: 'scan-hint' }, 'Digite parte do nome ou o código de barras (com ou sem os zeros do começo)'),
          termo.length >= 2 && resultados.length === 0 && h('p', { className: 'empty' }, 'Nenhum produto encontrado'),
          resultados.map(id => h('div', { key: id, className: 'lista-item', onClick: () => onSelect(id), style: { cursor: 'pointer' } },
            h('span', { className: 'nome' }, PRODUTOS[id].n),
            h('span', { className: 'qtd' },
              (ehCodigo ? codigoDoId(id) + ' · ' : '') +
              (contagens[id] ? '✓ contado' : (PRODUTOS[id].e === '' ? '' : 'sist: ' + PRODUTOS[id].e))
            )
          ))
        )
      );
    }

    function ListaTab({ contagens, onSelect, mostrarToast, sync, sincronizarTudo }) {
      const ids = Object.keys(contagens);
      const exportar = () => {
        let linhas = ['Codigo;Produto;Qtd loja;Qtd estoque;Total;Estoque sistema;Diferenca;Etiqueta nova'];
        ids.forEach(id => {
          const p = PRODUTOS[id]; const c = contagens[id];
          const total = num(c.loja) + num(c.estoque);
          const dif = total - num(p.e);
          const codPrinc = codigoDoId(id);
          linhas.push([codPrinc, p.n, c.loja || 0, c.estoque || 0, total, p.e || 0, dif, c.etiqueta ? 'Sim' : ''].join(';'));
        });
        const csv = '﻿' + linhas.join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const hoje = new Date().toISOString().slice(0, 10);
        a.href = url; a.download = 'contagem_' + hoje + '.csv'; a.click();
        URL.revokeObjectURL(url);
        mostrarToast('Arquivo exportado');
      };
      const limparTudo = () => {
        if (confirm('Apagar TODAS as contagens deste aparelho?\n\nIsso NÃO apaga o que já foi pra planilha. Se algo ainda estiver pendente de envio, sincronize antes.')) {
          localStorage.removeItem('contagens'); location.reload();
        }
      };

      let syncTxt = 'As contagens ficam salvas na planilha do Google automaticamente.';
      if (sync.status === 'sem_url') syncTxt = 'Sincronização não configurada — os dados estão só neste aparelho. Configure o Apps Script (veja INSTRUCOES.md).';
      else if (sync.pendentes) syncTxt = sync.pendentes + ' contagem(ns) aguardando envio pra planilha.';
      else if (sync.status === 'offline') syncTxt = 'Sem internet no momento — envio quando a conexão voltar.';

      return h('div', null,
        h('div', { className: 'card' },
          h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 } },
            h('h2', { style: { fontSize: 16 } }, ids.length + ' produto' + (ids.length === 1 ? '' : 's') + ' contado' + (ids.length === 1 ? '' : 's')),
            ids.length > 0 && h('button', { className: 'btn btn-primary btn-sm', onClick: exportar }, '⬇ Exportar')
          )
        ),
        h('div', { className: 'card' },
          h('div', { className: 'sync-line' },
            h('span', null, syncTxt),
            sync.status !== 'sem_url' && ids.length > 0 &&
            h('button', { className: 'btn btn-outline btn-sm', onClick: sincronizarTudo }, '⟳ Sincronizar')
          )
        ),
        ids.length === 0 && h('div', { className: 'empty' }, 'Nenhuma contagem ainda. Escaneie produtos e preencha as quantidades — elas aparecem aqui.'),
        ids.length > 0 && h('div', { className: 'card' },
          ids.map(id => {
            const p = PRODUTOS[id]; const c = contagens[id];
            const total = num(c.loja) + num(c.estoque);
            const dif = total - num(p.e);
            let bg = 'var(--verde-bg)', tx = 'var(--verde-tx)', txt = 'OK';
            if (dif > 0) { txt = '+' + dif; } else if (dif < 0) { bg = 'var(--verm-bg)'; tx = 'var(--verm-tx)'; txt = dif; }
            return h('div', { key: id, className: 'lista-item', onClick: () => onSelect(id), style: { cursor: 'pointer' } },
              h('span', { className: 'nome' }, p.n, c.etiqueta && h('span', { style: { marginLeft: 6 }, title: 'Precisa de etiqueta nova' }, '🏷️')),
              h('span', null,
                h('span', { className: 'qtd' }, 'L:' + (c.loja || 0) + ' E:' + (c.estoque || 0)),
                h('span', { className: 'badge-dif', style: { background: bg, color: tx } }, txt)
              )
            );
          })
        ),
        ids.length > 0 && h('div', { className: 'card' },
          h('button', { className: 'link-btn', onClick: limparTudo, style: { color: 'var(--verm-tx)', display: 'block', margin: '0 auto' } }, 'Apagar todas as contagens')
        )
      );
    }

    // ---- carregar dados.json antes de iniciar ----
    function TelaCarregando(props) {
      return h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100vh', color: '#0F3D3E', padding: '20px', textAlign: 'center' } },
        h('div', { style: { fontSize: 48, marginBottom: 16 } }, '📦'),
        h('div', { style: { fontSize: 18, fontWeight: 700 } }, props.erro ? 'Erro ao carregar dados' : 'Carregando produtos...'),
        props.erro && h('div', { style: { fontSize: 14, color: '#721C24', marginTop: 12, maxWidth: 320 } }, props.erro),
        !props.erro && h('div', { style: { fontSize: 14, color: '#5A6A6A', marginTop: 8 } }, 'Só um instante')
      );
    }

    const rootEl = ReactDOM.createRoot(document.getElementById('root'));
    rootEl.render(h(TelaCarregando, {}));

    let ULT_MOD = null;
    fetch('./dados.json', { cache: 'no-cache' })
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); ULT_MOD = r.headers.get('last-modified'); return r.json(); })
      .then(d => {
        DADOS = d;
        // data da base: campo "atualizado" do dados.json (hora do relatório SysPDV);
        // sem ele, cai na data de publicação do arquivo (cabeçalho HTTP)
        if (d.atualizado) BASE_INFO = 'Estoque de ' + d.atualizado;
        else if (ULT_MOD) {
          try {
            const dt = new Date(ULT_MOD);
            BASE_INFO = 'Base de ' + dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) +
              ' ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          } catch (e) { }
        }
        CODIGOS = d.codigos;
        PRODUTOS = d.produtos;
        rootEl.render(h(App));
      })
      .catch(e => {
        rootEl.render(h(TelaCarregando, { erro: 'Não foi possível carregar dados.json (' + e.message + '). Verifique se o arquivo está na mesma pasta do index.html.' }));
      });
  </script>
</body>

</html>
